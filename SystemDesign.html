<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing</title>
<style>
:root {
  --bg: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  --glass: rgba(255,255,255,0.1);
  --border: rgba(255,255,255,0.2);
  --text: #ffffff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  position: fixed;
  width: 100%;
  top: 0;
  backdrop-filter: blur(12px);
  background: var(--glass);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  padding: 1rem 2rem;
}

nav a {
  color: var(--text);
  margin-left: 1rem;
  text-decoration: none;
}

section {
  padding: 120px 20px 60px;
  max-width: 1000px;
  margin: auto;
}

.glass {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  backdrop-filter: blur(15px);
}

.hero {
  text-align: center;
}

button {
  margin-top: 1rem;
  padding: 0.6rem 1.2rem;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 2rem;
  opacity: 0.7;
}
</style>
</head>
<body>

<header>
  <div id="logo">MySite</div>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="home">
  <div class="glass hero">
    <h1 id="title">Custom Title</h1>
    <p id="subtitle">Custom subtitle text</p>
    <button onclick="updateContent()">Edit Content</button>
  </div>
</section>

<section id="about">
  <div class="glass">
    <h2>About</h2>
    <p id="aboutText">Editable about section.</p>
  </div>
</section>

<section id="projects">
  <div class="glass">
    <h2>Projects</h2>
    <ul id="projectList">
      <li>Project 1</li>
      <li>Project 2</li>
    </ul>
  </div>
</section>

<section id="contact">
  <div class="glass">
    <h2>Contact</h2>
    <p id="contactText">Your contact info here.</p>
  </div>
</section>

<footer>
  <p>© 2026</p>
</footer>

<script>
function updateContent() {
  document.getElementById("title").textContent = prompt("Title:", "Custom Title");
  document.getElementById("subtitle").textContent = prompt("Subtitle:", "Custom subtitle text");
  document.getElementById("aboutText").textContent = prompt("About:", "Editable about section.");
  document.getElementById("contactText").textContent = prompt("Contact:", "Your contact info here.");
}
</script>

</body>
</html>
